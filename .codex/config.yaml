# Codex Harness Configuration
# Human-edited project settings. Task context remains JSONL because it is
# append-friendly and line-validatable.

session_commit_message: "chore: record Codex journal"
max_journal_lines: 2000

# Communication policy is project-readable here, but the source of truth is
# ~/.codex/AGENTS.md. SessionStart/prelude inject its Communication section.
communication:
  default_language: "English"
  switch_language_only_when_user_explicitly_asks: true

